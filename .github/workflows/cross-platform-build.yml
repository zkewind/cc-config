name: Cross-platform Build Check

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/cross-platform-build.yml"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "postcss.config.*"
      - "tailwind.config.*"
      - "tsconfig*.json"
      - "vite.config.*"
      - "src/**"
      - "src-tauri/**"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/cross-platform-build.yml"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "postcss.config.*"
      - "tailwind.config.*"
      - "tsconfig*.json"
      - "vite.config.*"
      - "src/**"
      - "src-tauri/**"

concurrency:
  group: cross-platform-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - macos-14
          - ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Cache Cargo registry and build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm build:renderer

      - name: Check Tauri backend
        run: cargo check --manifest-path src-tauri/Cargo.toml
